<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kritika's  Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Itim&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="frame1">
      <div class="calendarbg">
         <div class="calendar">
    <h1 class="calendar-title">Kritika's Calendar</h1>
    <div class="calendar-header">
      <button id="prev">◀</button>
      <h2 id="monthYear">Month</h2>
      <button id="next">▶</button>
    </div>
    <div class="calendar-actions">
      <button id="clearAllNotes">Clear all notes</button>
    </div>

    <div class="weekdays">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <div class="dates" id="dates"></div>
    <div id="notePopup" class="note-popup">
  <textarea id="noteInput" placeholder="Write your note..."></textarea>
  <div class="note-buttons">
    <button id="saveNote">Save</button>
    <button id="closeNote">Close</button>
  </div>
</div>
  </div>
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
